<div class="cx-width-80 cx-position-absolute cx-centered">
  <div class="cx-container-flow-horizontal">
    <div class="cx-container-flow-grow-1 cx-padding-5">
      <mat-card>
        <mat-card-title>
          <h2>{{ "user.login-page.form.title" | translate }}</h2>
        </mat-card-title>

        <mat-card-content>
          <form [formGroup]="loginForm">
            <mat-form-field class="cx-width-100" appearance="outline" required>
              <input
                id="email"
                class="cx-width-100"
                matInput
                type="email"
                formControlName="email"
                [placeholder]="
                  'user.login-page.form.placeholder.email' | translate
                "
                required
              />
            </mat-form-field>

            <mat-form-field class="cx-width-100" appearance="outline" required>
              <input
                id="password"
                class="cx-width-100"
                matInput
                type="password"
                [placeholder]="
                  'user.login-page.form.placeholder.password' | translate
                "
                formControlName="password"
                required
              />
            </mat-form-field>
          </form>
        </mat-card-content>

        <mat-card-actions>
          <div class="cx-action-button-container-horizontal">
            <button
              class="cx-action-button"
              mat-raised-button
              color="primary"
              [disabled]="!loginForm.valid"
              (click)="onSubmitLogin()"
            >
              <mat-icon>login</mat-icon>
              <mat-label>
                {{ "user.login-page.form.button.submit" | translate }}
              </mat-label>
            </button>
          </div>
        </mat-card-actions>
      </mat-card>
    </div>
    <div class="cx-container-flow-grow-0">
      <img src="/assets/img/login-page.jpg" height="100%" width="auto" />
    </div>
  </div>
</div>
