<div class="card">
  <p-table
    [value]="series"
    stripedRows
    paginator="true"
    [rows]="rows"
    sortMode="single"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="name">
          <div class="flex items-center gap-2">
            {{ "dashboard.series-list.label.name" | translate }}
            <p-sortIcon field="name" />
          </div>
        </th>
        <th pSortableColumn="count">
          <div class="flex items-center gap-2">
            {{ "dashboard.series-list.label.comic-count" | translate }}
            <p-sortIcon field="count" />
          </div>
        </th>
      </tr>
    </ng-template>

    <ng-template #body let-series>
      <tr>
        <td>{{ series.name }}</td>
        <td>{{ series.count }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
